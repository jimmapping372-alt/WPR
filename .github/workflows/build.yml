name: WPR Android Smart Build
on: workflow_dispatch

jobs:
  build-android:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Android MAUI Workload
      run: dotnet workload install android

    - name: Clean Old Build Artifacts
      shell: bash
      run: |
        find . -type d \( -name "obj" -o -name "bin" \) -exec rm -rf {} +
      # Διαγράφει βίαια κάθε κολλημένο αρχείο project.assets.json για να ξεκινήσει καθαρό restore

    - name: Global Solution Restore
      run: dotnet restore Src/WPR.sln
      # Κάνει restore σε όλο το solution ταυτόχρονα (XNA, Avalonia, Android)

    - name: Build and Publish Android APK
      run: dotnet build Src/UI/WPR.UI.Android/WPR.UI.Android.csproj -c Release -t:Publish /p:TargetFramework=net8.0-android /p:AndroidSigningKeyPass=dummy /p:AndroidSigningStorePass=dummy /p:ErrorOnMissingNativeLibs=false
      # Χρησιμοποιούμε dotnet build -t:Publish που παρακάμπτει το bug του dotnet publish

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPR-Android-App
        path: Src/UI/WPR.UI.Android/bin/Release/net8.0-android/*-Signed.apk
        
