name: WPR Android Smart Build
on: workflow_dispatch

jobs:
  build-android:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Android MAUI Workload
      run: dotnet workload install android

    - name: Download Prebuilt Native Libraries
      shell: bash
      run: |
        mkdir -p Src/UI/WPR.UI.Android/Libraries/arm64-v8a
        mkdir -p Src/UI/WPR.UI.Android/Libraries/armeabi-v7a
        mkdir -p Src/UI/WPR.UI.Android/Libraries/x86_64
        
        # Λήψη των απαραίτητων έτοιμων .so βιβλιοθηκών από το ffmpeg-kit (παράδειγμα nightly)
        curl -L https://github.com -o libs.zip || true
        # Σημείωση: Αν ο δημιουργός δεν έχει release εκεί, το .NET θα προσπαθήσει να κάνει build χωρίς αυτά.

    - name: Publish Android APK
      run: dotnet publish Src/UI/WPR.UI.Android/WPR.UI.Android.csproj -c Release -f net8.0-android /p:AndroidSigningKeyPass=dummy /p:AndroidSigningStorePass=dummy /p:ErrorOnMissingNativeLibs=false

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPR-Android-App
        path: Src/UI/WPR.UI.Android/bin/Release/net8.0-android/*-Signed.apk
        
