name: WPR Android Smart Build
on: workflow_dispatch

jobs:
  build-android:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Android MAUI Workload
      run: dotnet workload install android

    - name: Publish Android APK
      run: dotnet publish Src/UI/WPR.UI.Android/WPR.UI.Android.csproj -c Release /p:TargetFramework=net8.0-android /p:AndroidSigningKeyPass=dummy /p:AndroidSigningStorePass=dummy /p:ErrorOnMissingNativeLibs=false
      # Αφαιρέθηκε το --no-restore και τα ενδιάμεσα restores. Τώρα το .NET θα προετοιμάσει μόνο του όλα τα απαραίτητα κομμάτια.

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPR-Android-App
        path: Src/UI/WPR.UI.Android/bin/Release/net8.0-android/*-Signed.apk
        
